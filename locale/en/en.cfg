[mod-setting-name]
chronokit-maximum-speed=Maximum speed multiplier
chronokit-minimum-speed=Minimum speed divisor
chronokit-starting-factor=Starting step factor (Advanced)
chronokit-step-increment=Step factor increment (Advanced)

[mod-setting-description]
chronokit-maximum-speed=The highest speed multiplier players can set. Caps the current speed if it exceeds this value.
chronokit-minimum-speed=The lowest speed divisor (e.g. "1/8" allows slowing to one-eighth normal speed). Default: 1/8.
chronokit-starting-factor=The multiplier applied on the first step away from x1. Must be greater than 1. Default: 1.5.
chronokit-step-increment=Amount added to the step multiplier on each successive step. Set to 0 for a constant ratio. Default: 0.25.

[mod-messages]
chronokit-message-admin-only=Only administrators can change the speed.
chronokit-message-game-paused=Game paused — damage taken at __1__
chronokit-message-speed-reset=Speed reset to x1 — damage taken at __1__

[shortcut-name]
chronokit-toggle=Toggle ChronoKit

[mod-tooltips]
chronokit-speed-control=Click: increase speed\nRight-click: decrease speed\nShift-click: toggle pause
chronokit-speed-paused=x0.0 (paused)
chronokit-damage-action=Damage behaviour: __1__\nClick to cycle: __2__ → __3__ → __4__\nRight-click to cycle backwards
chronokit-damage-action-none=Do nothing
chronokit-damage-action-reset=Reset speed
chronokit-damage-action-pause=Pause game
