<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#3a3f47"/>
      <stop offset="60%" stop-color="#23262b"/>
      <stop offset="100%" stop-color="#111214"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a8f96"/>
      <stop offset="45%" stop-color="#4c5056"/>
      <stop offset="55%" stop-color="#2b2d31"/>
      <stop offset="100%" stop-color="#6b6f76"/>
    </linearGradient>
    <linearGradient id="face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e3238"/>
      <stop offset="100%" stop-color="#191b1e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#e8790d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <!-- outer bolted ring -->
  <circle cx="256" cy="256" r="238" fill="none" stroke="url(#ring)" stroke-width="20"/>
  <g fill="#9a9fa6">
    <circle cx="256" cy="30" r="9"/>
    <circle cx="256" cy="482" r="9"/>
    <circle cx="30" cy="256" r="9"/>
    <circle cx="482" cy="256" r="9"/>
    <circle cx="98" cy="98" r="8"/>
    <circle cx="414" cy="98" r="8"/>
    <circle cx="98" cy="414" r="8"/>
    <circle cx="414" cy="414" r="8"/>
  </g>

  <!-- motion streaks suggesting speed -->
  <g stroke="url(#orange)" stroke-linecap="round" opacity="0.85">
    <path d="M 70 190 L 150 190" stroke-width="10"/>
    <path d="M 50 230 L 160 230" stroke-width="14"/>
    <path d="M 66 270 L 145 270" stroke-width="10"/>
  </g>

  <!-- clock face -->
  <circle cx="270" cy="256" r="150" fill="url(#face)" stroke="#55595f" stroke-width="6"/>

  <!-- tick marks -->
  <g stroke="#c7cbd1" stroke-width="5" stroke-linecap="round">
    <line x1="270" y1="122" x2="270" y2="142"/>
    <line x1="270" y1="370" x2="270" y2="390"/>
    <line x1="136" y1="256" x2="156" y2="256"/>
    <line x1="384" y1="256" x2="404" y2="256"/>
    <line x1="176" y1="162" x2="190" y2="176"/>
    <line x1="364" y1="336" x2="350" y2="322"/>
    <line x1="364" y1="176" x2="350" y2="190"/>
    <line x1="176" y1="350" x2="190" y2="336"/>
  </g>

  <!-- clock hands, angled fast/dynamic -->
  <g stroke-linecap="round">
    <line x1="270" y1="256" x2="270" y2="168" stroke="#e6e8eb" stroke-width="10"/>
    <line x1="270" y1="256" x2="336" y2="292" stroke="url(#orange)" stroke-width="14" filter="url(#glow)"/>
  </g>
  <circle cx="270" cy="256" r="14" fill="#f2a53f" stroke="#1a1c1e" stroke-width="4"/>

  <!-- speed arc arrow around clock -->
  <path d="M 380 150 A 150 150 0 0 1 415 256" fill="none" stroke="url(#orange)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <polygon points="415,256 398,232 432,236" fill="#ffb347"/>

  <!-- title-ish spark accents -->
  <g fill="#ffcf7a">
    <circle cx="150" cy="130" r="5"/>
    <circle cx="130" cy="380" r="4"/>
  </g>
</svg>
